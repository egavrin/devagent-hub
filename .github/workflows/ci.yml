name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: devagent-hub

      - uses: actions/checkout@v4
        with:
          repository: egavrin/devagent-sdk
          ref: main
          path: devagent-sdk

      - uses: actions/checkout@v4
        with:
          repository: egavrin/devagent-runner
          ref: main
          path: devagent-runner

      - uses: actions/checkout@v4
        with:
          repository: egavrin/devagent
          ref: main
          path: devagent

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install SDK dependencies
        working-directory: devagent-sdk
        run: bun install

      - name: Build SDK packages
        working-directory: devagent-sdk
        run: bun run build

      - name: Install runner dependencies
        working-directory: devagent-runner
        run: bun install

      - name: Build runner packages
        working-directory: devagent-runner
        run: bun run build

      - name: Install devagent dependencies
        working-directory: devagent
        run: bun install

      - name: Build devagent
        working-directory: devagent
        run: bun run build

      - name: Install hub dependencies
        working-directory: devagent-hub
        run: bun install

      - name: Typecheck
        working-directory: devagent-hub
        run: bunx tsc --noEmit

      - name: Test
        working-directory: devagent-hub
        run: bun run test

      - name: Build
        working-directory: devagent-hub
        run: bun run build
